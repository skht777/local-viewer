name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HUSKY: "0"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # Node: ルート (oxlint/oxfmt) + フロントエンド
      - run: npm ci
      - run: cd frontend && npm ci

      # Rust lint
      - run: cd backend && cargo clippy --all-targets --all-features -- -D warnings
      - run: cd backend && cargo fmt --check

      # Frontend lint
      - run: npx oxlint frontend/src/
      - run: npx oxfmt --check frontend/src/

  test-backend:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # アーカイブテスト (p7zip-full) + PDF サムネイル (poppler-utils)
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full poppler-utils

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - run: cd backend && cargo test

  test-frontend:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci
      - run: cd frontend && npx vitest run

  e2e:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # バックエンドランタイム依存 (7z + ffmpeg + RAR + PDF サムネイル)
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq p7zip-full ffmpeg unrar-free poppler-utils

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      # フロントエンド依存
      - run: cd frontend && npm ci

      # E2E 依存 + Playwright ブラウザ
      - run: cd e2e && npm ci
      - run: cd e2e && npx playwright install --with-deps chromium

      # Git は空ディレクトリを追跡できないため手動作成
      - run: mkdir -p e2e/fixtures/test-data/empty

      # Playwright webServer タイムアウト防止: 事前ビルド
      - run: cd backend && cargo build

      # テスト実行 (webServer が backend + frontend を自動起動)
      - run: cd e2e && npx playwright test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: e2e/test-results/

  docker:
    needs: e2e
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: docker build -t local-viewer:ci .

      # スモークテスト: E2E フィクスチャを DATA_DIR に使用
      - run: mkdir -p e2e/fixtures/test-data/empty
      - run: DATA_DIR=./e2e/fixtures/test-data docker compose up -d
      - run: sleep 5
      - run: curl -f http://localhost:8000/api/health
      - run: docker compose down
