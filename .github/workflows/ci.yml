name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HUSKY: "0"
  CARGO_INCREMENTAL: 0
  # CI では target-cpu=native を無効化 (proc-macro .so が runner CPU で SIGILL を起こすため)。
  # mold リンカ指定は引き継ぐ (.cargo/config.toml の build.rustflags は RUSTFLAGS env により上書きされるため)。
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # mold リンカー + テスト用ランタイム依存
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq mold p7zip-full poppler-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          shared-key: rust-backend

      # Rust lint + test を1ジョブで実行（ビルド1回で済む）
      - run: cd backend && cargo fmt --check
      - run: cd backend && cargo clippy --all-targets -- -D warnings
      - run: cd backend && cargo test

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # Node: ルート (oxlint/oxfmt) + フロントエンド
      - run: npm ci
      - run: cd frontend && npm ci

      # Frontend lint
      - run: npx oxlint frontend/src/
      - run: npx oxfmt --check frontend/src/

  test-frontend:
    needs: lint-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci
      - run: cd frontend && npx vitest run

  e2e:
    needs: [lint-and-test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # バックエンドランタイム依存 (7z + ffmpeg + RAR + PDF サムネイル + mold)
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq mold p7zip-full ffmpeg unrar-free poppler-utils

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          shared-key: rust-backend

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      # フロントエンド依存
      - run: cd frontend && npm ci

      # E2E 依存 + Playwright ブラウザ
      - run: cd e2e && npm ci
      - run: cd e2e && npx playwright install --with-deps chromium

      # Git は空ディレクトリを追跡できないため手動作成
      - run: mkdir -p e2e/fixtures/test-data/empty

      # Playwright webServer タイムアウト防止: 事前ビルド
      - run: cd backend && cargo build

      # テスト実行 (webServer が backend + frontend を自動起動)
      - run: cd e2e && npx playwright test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: e2e/test-results/

  docker:
    needs: e2e
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - run: docker build -t local-viewer:ci .

      # スモークテスト: E2E フィクスチャをコンテナにマウントして起動
      - name: Prepare smoke test
        run: |
          mkdir -p e2e/fixtures/test-data/empty
          echo '{"version":2,"mounts":[{"mount_id":"ci-smoke","name":"test","slug":".","host_path":"/mnt-host"}]}' > config/mounts.json
          printf 'services:\n  viewer:\n    volumes:\n      - ./e2e/fixtures/test-data:/mnt-host\n' > docker-compose.ci.yml
          # NODE_SECRET は 09_security.md より本番/通常運用で必須。CI では毎回ランダム生成して export
          echo "NODE_SECRET=$(openssl rand -hex 32)" >> "$GITHUB_ENV"
      - run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
      - name: Health check
        run: curl -f --retry 15 --retry-delay 3 --retry-all-errors http://localhost:8000/api/health
      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=50
      - run: docker compose down
