services:
  viewer:
    build: .
    ports:
      - "${HOST_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config
      - viewer-index:/app/data
    tmpfs:
      - /tmp/viewer-disk-cache:size=${DISK_CACHE_SIZE:-2g}
    environment:
      - MOUNT_BASE_DIR=${MOUNT_BASE_DIR:-/mnt-host}
      - MOUNT_CONFIG_PATH=/app/config/mounts.json
      - BIND_HOST=${BIND_HOST:-127.0.0.1}
      - INDEX_DB_PATH=/app/data/index.db
      - WATCH_MODE=${WATCH_MODE:-auto}
      - WATCH_POLL_INTERVAL=${WATCH_POLL_INTERVAL:-30}
      - REBUILD_RATE_LIMIT_SECONDS=${REBUILD_RATE_LIMIT_SECONDS:-60}
      - SEARCH_MAX_RESULTS=${SEARCH_MAX_RESULTS:-200}
      - SEARCH_QUERY_TIMEOUT=${SEARCH_QUERY_TIMEOUT:-5}
    restart: unless-stopped
    mem_limit: ${MEM_LIMIT:-2g}
    cpus: ${CPUS:-2.0}

volumes:
  viewer-index:
